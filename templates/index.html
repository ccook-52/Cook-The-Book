<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook The Book v0.1</title>
  <style>
    /*
      Phase 6: minimal CSS to make the form readable on mobile.
      No framework — just enough to not look broken on a phone.
    */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    /* Each filter row: label on the left, controls on the right */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-row label {
      min-width: 110px;
      font-weight: bold;
    }
    select { padding: 4px; }
    button { padding: 4px 10px; cursor: pointer; }
    /* The advanced filters panel — hidden by default */
    #advanced-filters {
      display: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 12px;
      margin: 12px 0;
      background: #f9f9f9;
    }
    #advanced-filters.open { display: block; }
    #toggle-advanced { margin-bottom: 12px; }
    /* Results table */
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #999; padding: 4px 8px; text-align: center; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>Cook The Book v0.1</h1>

  <form id="trend-form">
    <!--
      REQUIRED: Spread range — unchanged from Phase 2.
      These are SIGNED values matching home_spread in the database.
      Example: -10 to -3 = "home team favored by 3 to 10 points"
    -->
    <div class="filter-row">
      <label for="spread-min">Spread Min:</label>
      <button type="button" onclick="stepSelect('spread-min', -0.5)">-</button>
      <select id="spread-min" required></select>
      <button type="button" onclick="stepSelect('spread-min', 0.5)">+</button>
    </div>
    <div class="filter-row">
      <label for="spread-max">Spread Max:</label>
      <button type="button" onclick="stepSelect('spread-max', -0.5)">-</button>
      <select id="spread-max" required></select>
      <button type="button" onclick="stepSelect('spread-max', 0.5)">+</button>
    </div>

    <!--
      Phase 6: Advanced filters toggle.
      Progressive disclosure — the page loads clean with just the spread picker.
      Click "Advanced Filters" to reveal team, season, week, game type,
      and total line controls.
    -->
    <button type="button" id="toggle-advanced" onclick="toggleAdvanced()">
      Advanced Filters &#9660;
    </button>

    <div id="advanced-filters">
      <!--
        OPTIONAL: Team dropdown.
        "Any" = no team filter (sends empty string, server treats as None).
        Teams sorted alphabetically.  Includes OAK/SD/STL for historic games.
      -->
      <div class="filter-row">
        <label for="team">Team:</label>
        <select id="team"></select>
      </div>

      <!--
        OPTIONAL: Season range.
        "Any" in either dropdown = no season filter.
        Both must be set or neither — the UI sends empty strings for "Any".
      -->
      <div class="filter-row">
        <label for="season-min">Season:</label>
        <select id="season-min"></select>
        <span>to</span>
        <select id="season-max"></select>
      </div>

      <!--
        OPTIONAL: Week range.
        Weeks 1-22 cover regular season (1-18) and playoffs (19-22 in nflverse).
      -->
      <div class="filter-row">
        <label for="week-min">Week:</label>
        <select id="week-min"></select>
        <span>to</span>
        <select id="week-max"></select>
      </div>

      <!--
        OPTIONAL: Game type.
        REG = regular season, WC/DIV/CON/SB = playoff rounds.
      -->
      <div class="filter-row">
        <label for="game-type">Game Type:</label>
        <select id="game-type">
          <option value="">Any</option>
          <option value="REG">Regular Season</option>
          <option value="WC">Wild Card</option>
          <option value="DIV">Divisional</option>
          <option value="CON">Conference Championship</option>
          <option value="SB">Super Bowl</option>
        </select>
      </div>

      <!--
        Phase 7: OPTIONAL: Total line range (over/under).
        Filters by the sportsbook O/U line.
        Example: 44 to 50 = "games where the total was set between 44 and 50"
        "Any" = no total line filter.
      -->
      <div class="filter-row">
        <label for="total-min">Total Line:</label>
        <select id="total-min"></select>
        <span>to</span>
        <select id="total-max"></select>
      </div>
    </div>

    <button type="submit">Run Trend</button>
  </form>

  <!-- Results appear here after the fetch call -->
  <div id="results"></div>

  <script>
    // -----------------------------------------------------------------------
    // SPREAD PICKER — dropdown + step buttons (unchanged from Phase 2)
    // -----------------------------------------------------------------------

    const spreadValues = [];
    for (let v = -17; v <= 17; v += 0.5) {
      spreadValues.push(v);
    }

    function populateSelect(selectId, defaultValue) {
      const sel = document.getElementById(selectId);
      for (const v of spreadValues) {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        if (v === defaultValue) opt.selected = true;
        sel.appendChild(opt);
      }
    }

    function stepSelect(selectId, delta) {
      const sel = document.getElementById(selectId);
      const currentIndex = sel.selectedIndex;
      const newIndex = currentIndex + (delta > 0 ? 1 : -1);
      if (newIndex >= 0 && newIndex < sel.options.length) {
        sel.selectedIndex = newIndex;
      }
    }

    populateSelect("spread-min", -10);
    populateSelect("spread-max", -1);

    // -----------------------------------------------------------------------
    // Phase 6: ADVANCED FILTER CONTROLS
    // -----------------------------------------------------------------------

    // Toggle the advanced filters panel open/closed.
    function toggleAdvanced() {
      const panel = document.getElementById("advanced-filters");
      const btn = document.getElementById("toggle-advanced");
      panel.classList.toggle("open");
      btn.innerHTML = panel.classList.contains("open")
        ? "Advanced Filters &#9650;"
        : "Advanced Filters &#9660;";
    }

    // --- Team dropdown ---
    const teams = [
      "ARI","ATL","BAL","BUF","CAR","CHI","CIN","CLE",
      "DAL","DEN","DET","GB","HOU","IND","JAX","KC",
      "LAC","LAR","LV","MIA","MIN","NE","NO","NYG",
      "NYJ","OAK","PHI","PIT","SD","SEA","SF","STL","TB","TEN","WAS"
    ];
    (function populateTeams() {
      const sel = document.getElementById("team");
      const any = document.createElement("option");
      any.value = "";
      any.textContent = "Any";
      sel.appendChild(any);
      for (const t of teams) {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      }
    })();

    // --- Season range dropdowns ---
    (function populateSeasons() {
      for (const id of ["season-min", "season-max"]) {
        const sel = document.getElementById(id);
        const any = document.createElement("option");
        any.value = "";
        any.textContent = "Any";
        sel.appendChild(any);
        for (let y = 1999; y <= 2025; y++) {
          const opt = document.createElement("option");
          opt.value = y;
          opt.textContent = y;
          sel.appendChild(opt);
        }
      }
    })();

    // --- Week range dropdowns ---
    (function populateWeeks() {
      for (const id of ["week-min", "week-max"]) {
        const sel = document.getElementById(id);
        const any = document.createElement("option");
        any.value = "";
        any.textContent = "Any";
        sel.appendChild(any);
        for (let w = 1; w <= 22; w++) {
          const opt = document.createElement("option");
          opt.value = w;
          opt.textContent = w;
          sel.appendChild(opt);
        }
      }
    })();

    // --- Phase 7: Total line range dropdowns ---
    // Over/under lines in our data range from 28.5 to 63.5.
    // We use whole numbers 28 to 64 in 0.5 steps for the dropdown.
    // "Any" = no total line filter.
    (function populateTotals() {
      for (const id of ["total-min", "total-max"]) {
        const sel = document.getElementById(id);
        const any = document.createElement("option");
        any.value = "";
        any.textContent = "Any";
        sel.appendChild(any);
        for (let t = 28; t <= 64; t += 0.5) {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          sel.appendChild(opt);
        }
      }
    })();

    // -----------------------------------------------------------------------
    // FORM SUBMISSION — uses fetch() to POST JSON, no page reload
    // -----------------------------------------------------------------------
    document.getElementById("trend-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const spreadMin = parseFloat(document.getElementById("spread-min").value);
      const spreadMax = parseFloat(document.getElementById("spread-max").value);

      // Build the request body.  Always include spread (required).
      const body = {
        spread_min: spreadMin,
        spread_max: spreadMax,
      };

      // Phase 6: read optional filter values from the form.
      const team = document.getElementById("team").value;
      const seasonMin = document.getElementById("season-min").value;
      const seasonMax = document.getElementById("season-max").value;
      const weekMin = document.getElementById("week-min").value;
      const weekMax = document.getElementById("week-max").value;
      const gameType = document.getElementById("game-type").value;
      // Phase 7: total line range
      const totalMin = document.getElementById("total-min").value;
      const totalMax = document.getElementById("total-max").value;

      if (team) body.team = team;
      if (seasonMin) body.season_min = parseInt(seasonMin);
      if (seasonMax) body.season_max = parseInt(seasonMax);
      if (weekMin) body.week_min = parseInt(weekMin);
      if (weekMax) body.week_max = parseInt(weekMax);
      if (gameType) body.game_type = gameType;
      if (totalMin) body.total_min = parseFloat(totalMin);
      if (totalMax) body.total_max = parseFloat(totalMax);

      const res = await fetch("/api/run-trend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (data.error) {
        document.getElementById("results").innerHTML =
          "<p style='color:red;'>" + data.error + "</p>";
        return;
      }

      // -----------------------------------------------------------------------
      // RENDER RESULTS — ATS + O/U stats, intentionally plain HTML
      // -----------------------------------------------------------------------
      let html = "<h2>Results</h2>";
      html += "<p><strong>Matching games (n):</strong> " + data.n + "</p>";

      // ATS summary
      html += "<h3>ATS (Against The Spread)</h3>";
      html += "<ul>";
      html += "<li><strong>Covers:</strong> " + data.covers + "</li>";
      html += "<li><strong>Pushes:</strong> " + data.pushes + "</li>";
      html += "<li><strong>No Covers:</strong> " + data.no_covers + "</li>";
      html += "<li><strong>Hit Rate:</strong> " + (data.hit_rate * 100).toFixed(1) + "%</li>";
      html += "</ul>";

      // Phase 7: O/U summary
      html += "<h3>O/U (Over/Under)</h3>";
      html += "<ul>";
      html += "<li><strong>Overs:</strong> " + data.overs + "</li>";
      html += "<li><strong>Unders:</strong> " + data.unders + "</li>";
      html += "<li><strong>Pushes:</strong> " + data.ou_pushes + "</li>";
      html += "<li><strong>Over Rate:</strong> " + (data.ou_rate * 100).toFixed(1) + "%</li>";
      html += "</ul>";

      // Last 10 table — now includes Total and O/U columns
      if (data.last_10.length > 0) {
        html += "<h3>Last 10 Matches</h3>";
        html += "<table>";
        html += "<tr><th>Season</th><th>Wk</th><th>Type</th><th>Home</th><th>Away</th>"
              + "<th>Score</th><th>Spread</th><th>ATS</th>"
              + "<th>Total</th><th>O/U</th></tr>";

        for (const g of data.last_10) {
          // ATS result — accounts for team perspective (Phase 6).
          let ats;
          if (team && g.away_team === team) {
            ats = -g.result + (-g.home_spread);
          } else {
            ats = g.result + g.home_spread;
          }
          let atsLabel = "NO COVER";
          if (ats > 0) atsLabel = "COVER";
          else if (ats === 0) atsLabel = "PUSH";

          // Phase 7: O/U result for this game.
          // actual_total = combined score, ou_value = how much it exceeded the line.
          const actualTotal = g.home_score + g.away_score;
          const ouValue = actualTotal - g.total_line;
          let ouLabel = "UNDER";
          if (ouValue > 0) ouLabel = "OVER";
          else if (ouValue === 0) ouLabel = "PUSH";

          html += "<tr>"
                + "<td>" + g.season + "</td>"
                + "<td>" + g.week + "</td>"
                + "<td>" + g.game_type + "</td>"
                + "<td>" + g.home_team + "</td>"
                + "<td>" + g.away_team + "</td>"
                + "<td>" + g.home_score + "-" + g.away_score + "</td>"
                + "<td>" + g.home_spread + "</td>"
                + "<td>" + atsLabel + "</td>"
                + "<td>" + g.total_line + "</td>"
                + "<td>" + ouLabel + "</td>"
                + "</tr>";
        }
        html += "</table>";
      }

      document.getElementById("results").innerHTML = html;
    });
  </script>
</body>
</html>
